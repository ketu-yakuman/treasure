<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="麻雀精算">
<meta name="theme-color" content="#0f4a2e">
<title>麻雀精算</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#0a2e1a;font-family:'Hiragino Sans','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;color:#faf5e4;overscroll-behavior:none}

body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px}

.logo{font-size:52px;margin-bottom:12px}
.app-title{font-size:26px;font-weight:700;color:#faf5e4;letter-spacing:1px;margin-bottom:4px}
.app-sub{font-size:13px;color:#9fcfb0;margin-bottom:48px}

.select-label{font-size:12px;color:#9fcfb0;font-weight:600;letter-spacing:.8px;margin-bottom:14px;text-align:center}

.mode-btns{display:flex;flex-direction:column;gap:14px;width:100%;max-width:360px}

.mode-btn{
  display:flex;align-items:center;gap:16px;
  background:#0f4a2e;border:2px solid #2d7a52;
  border-radius:16px;padding:20px 24px;
  text-decoration:none;color:#faf5e4;
  transition:.15s;cursor:pointer;
}
.mode-btn:active{transform:scale(.97);border-color:#d4ac0d;background:#1a3a1a}
.mode-icon{font-size:36px;flex-shrink:0}
.mode-info{}
.mode-name{font-size:20px;font-weight:700;margin-bottom:4px}
.mode-desc{font-size:12px;color:#9fcfb0;line-height:1.6}

.footer{font-size:11px;color:#2d5a3a;margin-top:40px;text-align:center}
</style>
</head>
<body>

<div class="logo">🀄</div>
<div class="app-title">麻雀精算</div>
<div class="app-sub">対局タイプを選んでください</div>

<div class="select-label">SELECT MODE</div>

<div class="mode-btns">
  <a class="mode-btn" href="mahjong3.html">
    <span class="mode-icon">3️⃣</span>
    <div class="mode-info">
      <div class="mode-name">三人麻雀</div>
      <div class="mode-desc">3人 / 35,000点スタート</div>
    </div>
  </a>
  <a class="mode-btn" href="mahjong4.html">
    <span class="mode-icon">4️⃣</span>
    <div class="mode-info">
      <div class="mode-name">四人麻雀</div>
      <div class="mode-desc">4人 / 25,000点スタート</div>
    </div>
  </a>
</div>

<div class="footer">ketu-yakuman.github.io/treasure/</div>

</body>
</html>
